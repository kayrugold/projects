<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Forge | Dynamic Loop Generator</title>
    <style>
        :root {
            --bg-base: #050508;
            --bg-panel: #0d0d12;
            --accent-cyan: #00ffcc;
            --accent-hover: #00e6b8;
            --accent-danger: #ff3366;
            --text-main: #e2e8f0;
            --text-muted: #64748b;
            --font-mono: 'Courier New', Courier, monospace;
            --glow: 0 0 10px rgba(0, 255, 204, 0.2);
        }

        body {
            font-family: var(--font-mono);
            background-color: var(--bg-base);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-image:
                linear-gradient(rgba(0, 255, 204, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 204, 0.03) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .tool-container {
            background-color: var(--bg-panel);
            border: 1px solid rgba(0, 255, 204, 0.3);
            border-radius: 4px;
            padding: 30px;
            width: 100%;
            max-width: 450px;
            box-shadow: var(--glow);
            position: relative;
        }

        /* Scanline effect */
        .tool-container::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
            border-bottom: 1px solid rgba(0, 255, 204, 0.1);
            padding-bottom: 15px;
        }

        .header h2 { margin: 0 0 5px 0; color: var(--accent-cyan); font-weight: normal; letter-spacing: 1px; text-shadow: 0 0 5px rgba(0, 255, 204, 0.4); }
        .header p { margin: 0; font-size: 0.85rem; color: var(--text-muted); }

        /* Settings Row */
        .settings-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            gap: 10px;
        }
        .setting-group {
            display: flex;
            flex-direction: column;
            width: 50%;
        }
        .setting-group label {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 4px;
        }
        .setting-group input {
            background: rgba(0, 255, 204, 0.05);
            border: 1px solid rgba(0, 255, 204, 0.3);
            color: var(--accent-cyan);
            padding: 8px;
            font-family: var(--font-mono);
            text-align: center;
            outline: none;
        }
        .setting-group input:focus { border-color: var(--accent-cyan); }

        input[type="file"] { display: none; }

        .file-label {
            display: block;
            text-align: center;
            padding: 20px;
            border: 1px dashed var(--accent-cyan);
            border-radius: 4px;
            cursor: pointer;
            color: var(--accent-cyan);
            transition: all 0.2s ease;
            margin-bottom: 15px;
            background: rgba(0, 255, 204, 0.02);
        }
        .file-label:hover { background: rgba(0, 255, 204, 0.08); box-shadow: inset 0 0 10px rgba(0, 255, 204, 0.1); }

        button {
            width: 100%; padding: 12px; margin-bottom: 15px; background: transparent; color: var(--accent-cyan); border: 1px solid var(--accent-cyan); font-family: var(--font-mono); font-size: 0.9rem; cursor: pointer; transition: all 0.2s ease; text-transform: uppercase; letter-spacing: 1px; position: relative; z-index: 10;
        }
        button:hover { background: var(--accent-cyan); color: var(--bg-base); box-shadow: 0 0 15px rgba(0, 255, 204, 0.4); }
        button:disabled { border-color: var(--text-muted); color: var(--text-muted); cursor: not-allowed; background: transparent; box-shadow: none; }

        #previewBtn { border-color: #38bdf8; color: #38bdf8; display: none; }
        #previewBtn:hover { background: #38bdf8; color: var(--bg-base); }
        #stopBtn { border-color: var(--accent-danger); color: var(--accent-danger); display: none; }
        #stopBtn:hover { background: var(--accent-danger); color: white; }

        .status-box { text-align: center; padding: 10px; font-size: 0.85rem; color: var(--text-muted); min-height: 20px; }
        .download-btn { display: none; text-align: center; padding: 12px; background: #1e293b; color: #38bdf8; text-decoration: none; border: 1px solid #38bdf8; font-size: 0.9rem; text-transform: uppercase; transition: all 0.2s ease; position: relative; z-index: 10;}
        .download-btn:hover { background: #38bdf8; color: #0f172a; }

        /* The Forge Branding */
        .forge-signature {
            margin-top: 30px;
            padding-top: 15px;
            border-top: 1px dashed rgba(0, 255, 204, 0.2);
            text-align: center;
            font-size: 0.75rem;
            color: var(--text-muted);
            letter-spacing: 1px;
            position: relative;
            z-index: 10;
        }
        .forge-signature a {
            color: var(--accent-cyan);
            text-decoration: none;
            transition: all 0.2s ease;
        }
        .forge-signature a:hover {
            color: #fff;
            text-shadow: 0 0 8px var(--accent-cyan);
        }
    </style>
</head>
<body>

<div class="tool-container">
    <div class="header">
        <h2>ANDY'S AUDIO LOOP CREATOR</h2>
        <p>Crossfades tracks to create a pretty solid audio loop from any mp3, wav, or ogg.</p>
    </div>

    <label class="file-label" id="dropZone">
        [ SELECT AUDIO TARGET ]
        <input type="file" id="audioInput" accept=".ogg, .mp3, .wav">
    </label>

    <div class="settings-row">
        <div class="setting-group">
            <label>TARGET BPM</label>
            <input type="number" id="bpmInput" value="100" step="1">
        </div>
        <div class="setting-group">
            <label>CROSSFADE (BARS)</label>
            <input type="number" id="fadeBarsInput" value="1" step="0.5">
        </div>
    </div>

    <button id="processBtn" disabled>Initialize Processing</button>
    <button id="previewBtn">► Execute Playback</button>
    <button id="stopBtn">■ Terminate Playback</button>
    <a id="downloadLink" class="download-btn">↓ Extract WAV Artifact</a>

    <div class="status-box" id="status">Awaiting input stream...</div>

    <div class="forge-signature">
        SYS.AUTH: ANDY'S DEV STUDIO // THE FORGE<br>
        <a href="https://andysdevstudio.pages.dev" target="_blank">andysdevstudio.pages.dev</a>
    </div>
</div>

<script>
// UI Interactions
const fileInput = document.getElementById('audioInput');
const dropZone = document.getElementById('dropZone');
const processBtn = document.getElementById('processBtn');
const statusEl = document.getElementById('status');

fileInput.addEventListener('change', (e) => {
    if (e.target.files.length > 0) {
        dropZone.innerHTML = `[ TARGET AQUIRED: ${e.target.files[0].name} ] <input type="file" id="audioInput" accept=".ogg, .mp3, .wav" style="display:none;">`;
        processBtn.disabled = false;
        statusEl.innerText = "System ready.";
        statusEl.style.color = "var(--text-muted)";
        // Re-attach listener because innerHTML overwrote the input
        document.getElementById('audioInput').addEventListener('change', arguments.callee);
    }
});

// --- 1. THE INLINE WORKER (WAV ENCODER) ---
const workerCode = `
self.onmessage = function(e) {
    const { leftChannel, rightChannel, length, sampleRate } = e.data;
    const interleaved = new Float32Array(length * 2);
    for (let i = 0; i < length; i++) {
        interleaved[i * 2] = leftChannel[i];
        interleaved[i * 2 + 1] = rightChannel[i];
    }
    const buffer = new ArrayBuffer(44 + interleaved.length * 2);
    const view = new DataView(buffer);
    const writeString = (view, offset, string) => {
        for (let i = 0; i < string.length; i++) view.setUint8(offset + i, string.charCodeAt(i));
    };
    writeString(view, 0, 'RIFF');
    view.setUint32(4, 36 + interleaved.length * 2, true);
    writeString(view, 8, 'WAVE');
    writeString(view, 12, 'fmt ');
    view.setUint32(16, 16, true);
    view.setUint16(20, 1, true);
    view.setUint16(22, 2, true);
    view.setUint32(24, sampleRate, true);
    view.setUint32(28, sampleRate * 4, true);
    view.setUint16(32, 4, true);
    view.setUint16(34, 16, true);
    writeString(view, 36, 'data');
    view.setUint32(40, interleaved.length * 2, true);
    let offset = 44;
    for (let i = 0; i < interleaved.length; i++, offset += 2) {
        let s = Math.max(-1, Math.min(1, interleaved[i]));
        view.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
    }
    self.postMessage(new Blob([view], { type: 'audio/wav' }));
};
`;
const worker = new Worker(URL.createObjectURL(new Blob([workerCode], { type: 'application/javascript' })));

// --- 2. THE AUDIO MAGIC ---
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
let finalAudioBuffer = null;
let previewSource = null;

processBtn.onclick = async () => {
    if (audioCtx.state === 'suspended') await audioCtx.resume();

    const file = document.getElementById('audioInput').files[0] || fileInput.files[0];
    if (!file) return;

    statusEl.innerText = "Analyzing file geometry...";
    statusEl.style.color = "var(--accent-cyan)";
    document.getElementById('downloadLink').style.display = 'none';
    document.getElementById('previewBtn').style.display = 'none';
    document.getElementById('stopBtn').style.display = 'none';
    processBtn.disabled = true;
    if(previewSource) previewSource.stop();

    const arrayBuffer = await file.arrayBuffer();
    const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);

    // Dynamic Math
    const bpm = parseFloat(document.getElementById('bpmInput').value) || 100;
    const fadeBars = parseFloat(document.getElementById('fadeBarsInput').value) || 1;

    const beatDuration = 60 / bpm;
    const barDuration = 4 * beatDuration;
    const crossfadeDuration = fadeBars * barDuration;

    if (audioBuffer.duration < barDuration + crossfadeDuration) {
        statusEl.innerText = "ERR: File too short for these BPM settings.";
        statusEl.style.color = "var(--accent-danger)";
        processBtn.disabled = false;
        return;
    }

    const maxAvailableBars = Math.floor((audioBuffer.duration - crossfadeDuration) / barDuration);
    const loopDuration = maxAvailableBars * barDuration;
    const startPoint = 0;

    const offlineCtx = new OfflineAudioContext(
        audioBuffer.numberOfChannels,
        loopDuration * audioBuffer.sampleRate,
        audioBuffer.sampleRate
    );

    // Layer 1: Main Body
    const sourceMain = offlineCtx.createBufferSource();
    sourceMain.buffer = audioBuffer;
    const gainMain = offlineCtx.createGain();
    gainMain.gain.setValueAtTime(0, 0);
    gainMain.gain.linearRampToValueAtTime(1, crossfadeDuration);
    gainMain.gain.setValueAtTime(1, loopDuration);
    sourceMain.connect(gainMain).connect(offlineCtx.destination);
    sourceMain.start(0, startPoint, loopDuration);

    // Layer 2: Tail Overlap
    const sourceTail = offlineCtx.createBufferSource();
    sourceTail.buffer = audioBuffer;
    const gainTail = offlineCtx.createGain();
    gainTail.gain.setValueAtTime(1, 0);
    gainTail.gain.linearRampToValueAtTime(0, crossfadeDuration);
    sourceTail.connect(gainTail).connect(offlineCtx.destination);
    sourceTail.start(0, startPoint + loopDuration, crossfadeDuration);

    statusEl.innerText = `Rendering ${maxAvailableBars} bars (${loopDuration.toFixed(1)}s)...`;
    const renderedBuffer = await offlineCtx.startRendering();

    finalAudioBuffer = renderedBuffer;

    statusEl.innerText = "Encoding WAV artifact...";
    worker.postMessage({
        leftChannel: renderedBuffer.getChannelData(0),
        rightChannel: renderedBuffer.getChannelData(audioBuffer.numberOfChannels > 1 ? 1 : 0),
        length: renderedBuffer.length,
        sampleRate: renderedBuffer.sampleRate
    });
};

// --- 3. WORKER RESPONSE & PLAYBACK LOGIC ---
worker.onmessage = function(e) {
    statusEl.innerText = "Process complete. Ready for playback.";
    processBtn.disabled = false;
    processBtn.innerText = "Re-Initialize Processing";

    const currentBpm = document.getElementById('bpmInput').value || 100;
    const url = URL.createObjectURL(e.data);
    const downloadLink = document.getElementById('downloadLink');

    downloadLink.href = url;
    downloadLink.download = `TheForge_${currentBpm}BPM_Loop.wav`;
    downloadLink.style.display = 'block';

    document.getElementById('previewBtn').style.display = 'block';
};

document.getElementById('previewBtn').onclick = () => {
    if (previewSource) previewSource.stop();

    previewSource = audioCtx.createBufferSource();
    previewSource.buffer = finalAudioBuffer;
    previewSource.loop = true;
    previewSource.connect(audioCtx.destination);
    previewSource.start();

    document.getElementById('previewBtn').style.display = 'none';
    document.getElementById('stopBtn').style.display = 'block';
    statusEl.innerText = "Streaming infinite loop...";
};

document.getElementById('stopBtn').onclick = () => {
    if (previewSource) {
        previewSource.stop();
        previewSource = null;
    }
    document.getElementById('previewBtn').style.display = 'block';
    document.getElementById('stopBtn').style.display = 'none';
    statusEl.innerText = "Playback terminated.";
};
</script>

</body>
</html>
